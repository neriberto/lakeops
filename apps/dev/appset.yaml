---
# apps/dev/appset.yaml
# ----------------------------------------------------------------------------
# ApplicationSet for local dev (single-node, any conformant Kubernetes
# distribution — microk8s, k3s, kind, ...). Generates Applications for
# datalake components into the in-cluster destination.
#
# Applied via apps/bootstrap/dev.yaml which references this file as its
# path. The bootstrap Application itself uses project: default (the
# appset assigns each generated Application to its correct AppProject
# via `project: '{{.project}}'` below).
# ----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: appset-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: lake
    app.kubernetes.io/component: appset
    lake.io/environment: dev

spec:
  goTemplate: true

  generators:
    - list:
        elements:
          - name: seaweedfs
            repoURL: https://seaweedfs.github.io/seaweedfs/helm
            chart: seaweedfs
            version: 4.36.0
            namespace: seaweedfs-dev
            project: infrastructure
            syncWave: -2

          - name: cloudnative-pg
            repoURL: https://cloudnative-pg.github.io/charts
            chart: cloudnative-pg
            version: 0.26.0
            namespace: cloudnative-pg-dev
            project: infrastructure
            syncWave: -2

  template:
    metadata:
      name: "{{ .name }}-dev"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: lake
        app.kubernetes.io/component: workload
        lake.io/environment: dev
      annotations:
        argocd.argoproj.io/sync-wave: "{{ .syncWave }}"

    spec:
      project: "{{ .project }}"

      sources:
        - repoURL: "{{ .repoURL }}"
          chart: "{{ .chart }}"
          targetRevision: "{{ .version }}"
          helm:
            releaseName: "{{ .chart }}"
            ignoreMissingValueFiles: true
            valueFiles:
              - "$values/apps/values/dev/{{ .chart }}.yaml"

        - repoURL: https://github.com/neriberto/lakeops
          targetRevision: main
          ref: values

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"

      syncPolicy:
        automated:
          prune: false
          selfHeal: true
          allowEmpty: false

        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - ApplyOutOfSyncOnly=true

        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m