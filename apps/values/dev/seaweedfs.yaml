# apps/values/dev/seaweedfs.yaml
# Overrides for seaweedfs Helm chart in dev.
# storageClass intentionally omitted (inherits cluster default) so this file
# works on microk8s, EKS, GKE, k3s, kind, and any other conformant Kubernetes
# distribution without change.
# ----------------------------------------------------------------------------
master:
  enabled: true
  data:
    type: "persistentVolumeClaim"
    size: "1Gi"
volume:
  enabled: true
  readMode: proxy
  dataDirs:
    - name: data
      type: "persistentVolumeClaim"
      size: "10Gi"
      maxVolumes: 0
filer:
  enabled: true
  enablePVC: true
  storage: "5Gi"
  s3:
    enabled: true
    enableAuth: false
    port: 8333
s3:
  enabled: false
admin:
  enabled: true
